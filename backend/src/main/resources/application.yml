spring:
  application:
    name: jiv-backend

  datasource:
    url: jdbc:mysql://localhost:3307/jivdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

server:
  port: 8080

jiv:
  cors:
    allowed-origins: "http://localhost:3000"
  sandbox:
    image: jiv-sandbox:latest
    timeout-seconds: 15
    memory-limit-mb: 256
    cpu-limit: 0.5
    agent-jar-path: /agent/jiv-agent.jar

logging:
  level:
    com.jiv: DEBUG
    org.springframework.web.socket: INFO
